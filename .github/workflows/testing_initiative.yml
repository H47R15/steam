# This workflow installs Python dependencies via Poetry and runs the pytest suite.
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Tests

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '.gitignore'
      - '.env.example'
      - '*.md'
      - '*.rst'
      - 'LICENSE'
      - 'protobuf_list.txt'
      - 'protobufs/**'
      - 'recipes/**'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '.gitignore'
      - '.env.example'
      - '*.md'
      - '*.rst'
      - 'LICENSE'
      - 'protobuf_list.txt'
      - 'protobufs/**'
      - 'recipes/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Poetry
        uses: snok/install-poetry@v1
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "poetry"
      - name: Display Python version
        run: python -c "import sys; print(sys.version)"
      - name: Install dependencies
        run: poetry install --with dev --extras client
      - name: Run tests
        run: poetry run pytest --tb=short
